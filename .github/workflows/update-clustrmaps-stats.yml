name: Update ClustrMaps Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh ClustrMaps Stats
        run: python scripts/update_clustrmaps_stats.py

      - name: Commit Updated Stats
        run: |
          if git diff --quiet -- data/clustrmaps-stats.json index.html; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/clustrmaps-stats.json index.html
          git commit -m "Update ClustrMaps stats"
          git push
